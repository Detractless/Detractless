<svg
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  width="854"
  height="220"
  viewBox="0 0 854 220"
  fill="none"
>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&amp;display=swap');

    /* ── WALKER — slow independent cross (9s) ── */
    .wk-mover { animation: wkCross 9s linear infinite; }
    @keyframes wkCross {
      0%   { transform: translateX(-100px); }
      40%  { transform: translateX(375px);  }
      60%  { transform: translateX(375px);  }
      100% { transform: translateX(1000px); }
    }

    .wk-walk { animation: wkToggleWalk 9s linear infinite; }
    .wk-wave { animation: wkToggleWave 9s linear infinite; opacity: 0; }

    @keyframes wkToggleWalk {
      0%, 39.9%    { opacity: 1; }
      40%, 60%     { opacity: 0; }
      60.1%, 100%  { opacity: 1; }
    }
    @keyframes wkToggleWave {
      0%, 39.9%    { opacity: 0; }
      40%, 60%     { opacity: 1; }
      60.1%, 100%  { opacity: 0; }
    }

    .wk-bouncer { animation: wkBounce 0.5s infinite ease-in-out; }
    @keyframes wkBounce {
      0%, 100% { transform: translateY(3px); }
      50%      { transform: translateY(0px);  }
    }
    .wk-waving-arm {
      transform-origin: 50px 32px;
      animation: wkWaveAction 0.25s infinite alternate ease-in-out;
    }
    @keyframes wkWaveAction {
      0%   { transform: rotate(15deg);  }
      100% { transform: rotate(-25deg); }
    }

    /* ── STATS ───────────────────────────────────── */
    .stat-label { font-family: ui-monospace,SFMono-Regular,Menlo,'Courier New',monospace; font-size: 9px; fill: #8b949e; }
    .stat-val   { font-family: ui-monospace,SFMono-Regular,Menlo,'Courier New',monospace; font-size: 13px; font-weight: 600; fill: #e6edf3; }
    .stat-lang  { font-family: ui-monospace,SFMono-Regular,Menlo,'Courier New',monospace; font-size: 9px; font-weight: 600; fill: #f78166; }

    /* ── TYPING ──────────────────────────────────── */
    .typed { font-family: 'Caveat', cursive; font-size: 30px; font-weight: 700; }
    .line1 { fill: #C5C6C8; }
    .line2 { fill: #FFFFFF; }
    .line3 { fill: #FDBB30; }
  </style>

  <!-- ═══ BACKGROUND ════════════════════════════════ -->
  <rect width="854" height="220" fill="#0d1117" />

  <!-- ═══ TOP DOTTED LINE ═══════════════════════════ -->
  <line x1="0" y1="103" x2="854" y2="103"
        stroke="#e6edf3" stroke-width="2" opacity="0.2"
        stroke-linecap="round" stroke-dasharray="10 10" />

  <!-- ═══ WALKER ════════════════════════════════════ -->
  <g>
    <g class="wk-mover" stroke-linecap="round" fill="none">

      <!-- Walking pose -->
      <g class="wk-walk">
        <g class="wk-bouncer">
          <g stroke="#e6edf3" stroke-width="4">
            <path d="M 50 32 Q 35 45 30 55">
              <animate attributeName="d" dur="1s" repeatCount="indefinite"
                       keyTimes="0; 0.25; 0.5; 0.75; 1" calcMode="spline"
                       keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1"
                       values="M 50 32 Q 35 45 30 55; M 50 32 Q 45 45 50 60; M 50 32 Q 65 45 70 55; M 50 32 Q 55 45 50 60; M 50 32 Q 35 45 30 55" />
            </path>
            <path d="M 50 60 Q 65 75 70 95">
              <animate attributeName="d" dur="1s" repeatCount="indefinite"
                       keyTimes="0; 0.25; 0.5; 0.75; 1" calcMode="spline"
                       keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1"
                       values="M 50 60 Q 65 75 70 95; M 50 60 Q 60 80 50 95; M 50 60 Q 45 80 30 95; M 50 60 Q 70 70 40 85; M 50 60 Q 65 75 70 95" />
            </path>
          </g>
          <g stroke="#e6edf3" stroke-width="4">
            <circle cx="50" cy="20" r="10" />
            <line x1="50" y1="30" x2="50" y2="60" />
          </g>
          <g stroke="#e6edf3" stroke-width="4">
            <path d="M 50 32 Q 65 45 70 55">
              <animate attributeName="d" dur="1s" repeatCount="indefinite"
                       keyTimes="0; 0.25; 0.5; 0.75; 1" calcMode="spline"
                       keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1"
                       values="M 50 32 Q 65 45 70 55; M 50 32 Q 55 45 50 60; M 50 32 Q 35 45 30 55; M 50 32 Q 45 45 50 60; M 50 32 Q 65 45 70 55" />
            </path>
            <path d="M 50 60 Q 45 80 30 95">
              <animate attributeName="d" dur="1s" repeatCount="indefinite"
                       keyTimes="0; 0.25; 0.5; 0.75; 1" calcMode="spline"
                       keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1"
                       values="M 50 60 Q 45 80 30 95; M 50 60 Q 70 70 40 85; M 50 60 Q 65 75 70 95; M 50 60 Q 60 80 50 95; M 50 60 Q 45 80 30 95" />
            </path>
          </g>
        </g>
      </g>

      <!-- Waving pose -->
      <g class="wk-wave" stroke-width="4">
        <g stroke="#e6edf3">
          <path d="M 50 60 Q 40 80 35 95" />
          <path d="M 50 32 Q 35 45 35 60" />
        </g>
        <g stroke="#e6edf3">
          <circle cx="50" cy="20" r="10" />
          <line x1="50" y1="30" x2="50" y2="60" />
        </g>
        <g stroke="#e6edf3">
          <path d="M 50 60 Q 60 80 65 95" />
          <path class="wk-waving-arm" d="M 50 32 Q 70 40 75 15" />
        </g>
      </g>

    </g>
  </g>

  <!-- ═══ STATS ROW ══════════════════════════════════ -->
  <g>
    <rect x="67" y="113" width="110" height="16" rx="8" fill="#f7816622" stroke="#f78166" stroke-width="1"/>
    <text x="122" y="121" dy="0.35em" class="stat-lang" text-anchor="middle">JavaScript</text>
    <text x="122" y="138"  class="stat-label" text-anchor="middle">top lang</text>
  </g>
  <g>
    <text x="268" y="122" class="stat-val" text-anchor="middle">310</text>
    <text x="268" y="138" class="stat-label" text-anchor="middle">commits</text>
  </g>
  <g>
    <text x="390" y="122" class="stat-val" text-anchor="middle">7</text>
    <text x="390" y="138" class="stat-label" text-anchor="middle">stars</text>
  </g>
  <g>
    <text x="500" y="122" class="stat-val" text-anchor="middle">4</text>
    <text x="500" y="138" class="stat-label" text-anchor="middle">repos</text>
  </g>
  <g>
    <text x="622" y="122" class="stat-val" text-anchor="middle">3</text>
    <text x="622" y="138" class="stat-label" text-anchor="middle">open</text>
  </g>
  <g>
    <text x="744" y="122" class="stat-val" text-anchor="middle">4</text>
    <text x="744" y="138" class="stat-label" text-anchor="middle">closed</text>
  </g>

  <!-- ═══ BOTTOM DOTTED LINE ════════════════════════ -->
  <line x1="0" y1="150" x2="854" y2="150"
        stroke="#e6edf3" stroke-width="2" opacity="0.2"
        stroke-linecap="round" stroke-dasharray="10 10" />

  <!-- ═══ TYPING ANIMATION ══════════════════════════ -->
  <g transform="translate(20, 155)">
    <path id="tp0">
      <animate id="td0" attributeName="d"
               begin="0s;td2.end" dur="5000ms" fill="remove"
               values="m0,30 h0 ; m0,30 h810 ; m0,30 h810 ; m0,30 h0"
               keyTimes="0;0.6;0.8;1"/>
    </path>
    <text class="typed line1" dominant-baseline="middle">
      <textPath xlink:href="#tp0">Hey There, It's Christian Darby-Ward</textPath>
    </text>

    <path id="tp1">
      <animate id="td1" attributeName="d"
               begin="td0.end" dur="2800ms" fill="remove"
               values="m0,30 h0 ; m0,30 h330 ; m0,30 h330 ; m0,30 h0"
               keyTimes="0;0.6;0.8;1"/>
    </path>
    <text class="typed line2" dominant-baseline="middle">
      <textPath xlink:href="#tp1">A Software Developer</textPath>
    </text>

    <path id="tp2">
      <animate id="td2" attributeName="d"
               begin="td1.end" dur="2800ms" fill="remove"
               values="m0,30 h0 ; m0,30 h300 ; m0,30 h300 ; m0,30 h0"
               keyTimes="0;0.6;0.8;1"/>
    </path>
    <text class="typed line3" dominant-baseline="middle">
      <textPath xlink:href="#tp2">And Student At KSU</textPath>
    </text>
  </g>

</svg>
