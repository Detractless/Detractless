<svg
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  width="854"
  height="140"
  viewBox="0 0 854 140"
  fill="none"
>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&amp;display=swap');

    /* ── STATS ───────────────────────────────────── */
    .stat-label { font-family: ui-monospace,SFMono-Regular,Menlo,'Courier New',monospace; font-size: 9px; fill: #8b949e; }
    .stat-val   { font-family: ui-monospace,SFMono-Regular,Menlo,'Courier New',monospace; font-size: 13px; font-weight: 600; fill: #e6edf3; }
    .stat-lang  { font-family: ui-monospace,SFMono-Regular,Menlo,'Courier New',monospace; font-size: 9px; font-weight: 600; fill: #f78166; }

    /* ── TYPING ──────────────────────────────────── */
    .typed { font-family: 'Caveat', cursive; font-size: 30px; font-weight: 700; }
    .line1 { fill: #C5C6C8; }
    .line2 { fill: #FFFFFF; }
    .line3 { fill: #FDBB30; }
  </style>

  <!-- ═══ BACKGROUND ════════════════════════════════ -->
  <rect width="854" height="140" fill="#0d1117" />

  <!-- ═══ TOP DOTTED LINE ═══════════════════════════ -->
  <line x1="0" y1="20" x2="854" y2="20"
        stroke="#e6edf3" stroke-width="2" opacity="0.2"
        stroke-linecap="round" stroke-dasharray="10 10" />

  <!-- ═══ STATS ROW ══════════════════════════════════ -->
  <g>
    <rect x="67" y="30" width="110" height="16" rx="8" fill="#f7816622" stroke="#f78166" stroke-width="1"/>
    <text id="val-lang" x="122" y="38" dy="0.35em" class="stat-lang" text-anchor="middle">C#</text>
    <text x="122" y="55"  class="stat-label" text-anchor="middle">top lang</text>
  </g>
  <g>
    <text id="val-commits" x="268" y="39" class="stat-val" text-anchor="middle">338</text>
    <text x="268" y="55" class="stat-label" text-anchor="middle">commits</text>
  </g>
  <g>
    <text id="val-stars" x="390" y="39" class="stat-val" text-anchor="middle">7</text>
    <text x="390" y="55" class="stat-label" text-anchor="middle">stars</text>
  </g>
  <g>
    <text id="val-repos" x="500" y="39" class="stat-val" text-anchor="middle">3</text>
    <text x="500" y="55" class="stat-label" text-anchor="middle">repos</text>
  </g>
  <g>
    <text id="val-open" x="622" y="39" class="stat-val" text-anchor="middle">2</text>
    <text x="622" y="55" class="stat-label" text-anchor="middle">open</text>
  </g>
  <g>
    <text id="val-closed" x="744" y="39" class="stat-val" text-anchor="middle">7</text>
    <text x="744" y="55" class="stat-label" text-anchor="middle">closed</text>
  </g>

  <!-- ═══ BOTTOM DOTTED LINE ════════════════════════ -->
  <line x1="0" y1="67" x2="854" y2="67"
        stroke="#e6edf3" stroke-width="2" opacity="0.2"
        stroke-linecap="round" stroke-dasharray="10 10" />

  <!-- ═══ TYPING ANIMATION ══════════════════════════ -->
  <g transform="translate(20, 72)">
    <path id="tp0">
      <animate id="td0" attributeName="d"
               begin="0s;td2.end" dur="5000ms" fill="remove"
               values="m0,30 h0 ; m0,30 h810 ; m0,30 h810 ; m0,30 h0"
               keyTimes="0;0.6;0.8;1"/>
    </path>
    <text class="typed line1" dominant-baseline="middle">
      <textPath xlink:href="#tp0">Hey There, It's Christian Darby-Ward</textPath>
    </text>

    <path id="tp1">
      <animate id="td1" attributeName="d"
               begin="td0.end" dur="2800ms" fill="remove"
               values="m0,30 h0 ; m0,30 h330 ; m0,30 h330 ; m0,30 h0"
               keyTimes="0;0.6;0.8;1"/>
    </path>
    <text class="typed line2" dominant-baseline="middle">
      <textPath xlink:href="#tp1">A Software Developer</textPath>
    </text>

    <path id="tp2">
      <animate id="td2" attributeName="d"
               begin="td1.end" dur="2800ms" fill="remove"
               values="m0,30 h0 ; m0,30 h300 ; m0,30 h300 ; m0,30 h0"
               keyTimes="0;0.6;0.8;1"/>
    </path>
    <text class="typed line3" dominant-baseline="middle">
      <textPath xlink:href="#tp2">And Student At KSU</textPath>
    </text>
  </g>

</svg>
