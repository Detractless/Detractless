<svg
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  width="854"
  height="220"
  viewBox="0 0 854 220"
  fill="none"

>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&amp;display=swap');

    /*
      MASTER CYCLE = 10600ms
      Walker  :   0ms –  5000ms  (0%     → 47.17%)   "Hey There…"
      Skater  :5000ms –  7800ms  (47.17% → 73.585%)  "A Software Developer"
      Cyclist :7800ms – 10600ms  (73.585%→ 100%)      "And Student At KSU"
    */

    /* ── SCENE FADES ─────────────────────────────── */
    .scene-wk, .scene-sk, .scene-bi { opacity: 0; }

    @keyframes fadeWk {
      0%      { opacity: 0 }
      1%      { opacity: 1 }
      46%     { opacity: 1 }
      49%     { opacity: 0 }
      100%    { opacity: 0 }
    }
    @keyframes fadeSk {
      0%, 47.17%  { opacity: 0 }
      49%         { opacity: 1 }
      72.5%       { opacity: 1 }
      75.5%       { opacity: 0 }
      100%        { opacity: 0 }
    }
    @keyframes fadeBi {
      0%, 73.585%  { opacity: 0 }
      75.5%        { opacity: 1 }
      98%          { opacity: 1 }
      100%         { opacity: 0 }
    }

    .scene-wk { animation: fadeWk 10600ms linear infinite; }
    .scene-sk { animation: fadeSk 10600ms linear infinite; }
    .scene-bi { animation: fadeBi 10600ms linear infinite; }

    /* ── WALKER — slow independent cross (9s) ── */
    .wk-mover { animation: wkCross 9s linear infinite; }
    @keyframes wkCross {
      0%   { transform: translateX(-100px); }
      40%  { transform: translateX(375px);  }
      60%  { transform: translateX(375px);  }
      100% { transform: translateX(1000px); }
    }

    .wk-walk { animation: wkToggleWalk 9s linear infinite; }
    .wk-wave { animation: wkToggleWave 9s linear infinite; opacity: 0; }

    @keyframes wkToggleWalk {
      0%, 39.9%    { opacity: 1; }
      40%, 60%     { opacity: 0; }
      60.1%, 100%  { opacity: 1; }
    }
    @keyframes wkToggleWave {
      0%, 39.9%    { opacity: 0; }
      40%, 60%     { opacity: 1; }
      60.1%, 100%  { opacity: 0; }
    }

    .wk-bouncer { animation: wkBounce 0.5s infinite ease-in-out; }
    @keyframes wkBounce {
      0%, 100% { transform: translateY(3px); }
      50%      { transform: translateY(0px);  }
    }
    .wk-waving-arm {
      transform-origin: 50px 32px;
      animation: wkWaveAction 0.25s infinite alternate ease-in-out;
    }
    @keyframes wkWaveAction {
      0%   { transform: rotate(15deg);  }
      100% { transform: rotate(-25deg); }
    }

    /* ── SKATER — slow independent cross (9s) ── */
    .sk-group { animation: skCross 9s linear infinite; }
    @keyframes skCross {
      0%   { transform: translateX(-150px); }
      100% { transform: translateX(1000px); }
    }
    .sk-wheel {
      transform-origin: center;
      transform-box: fill-box;
      animation: skSpin 0.4s linear infinite;
    }
    @keyframes skSpin { 100% { transform: rotate(360deg); } }

    /* ── CYCLIST — slow independent cross (9s) ── */
    .bi-group { animation: biCross 9s linear infinite; }
    @keyframes biCross {
      0%   { transform: translateX(-150px); }
      100% { transform: translateX(1000px); }
    }
    .bi-wheel {
      transform-origin: center;
      transform-box: fill-box;
      animation: biSpin 0.9s linear infinite;
    }
    .bi-crank { transform-origin: 50px 80px; animation: biCrankSpin 1.5s linear infinite; }
    @keyframes biSpin      { 100% { transform: rotate(360deg); } }
    @keyframes biCrankSpin { 100% { transform: rotate(360deg); } }

    /* ── STATS ───────────────────────────────────── */
    .stat-label { font-family: ui-monospace,SFMono-Regular,Menlo,'Courier New',monospace; font-size: 9px; fill: #8b949e; }
    .stat-val   { font-family: ui-monospace,SFMono-Regular,Menlo,'Courier New',monospace; font-size: 13px; font-weight: 600; fill: #e6edf3; }
    .stat-lang  { font-family: ui-monospace,SFMono-Regular,Menlo,'Courier New',monospace; font-size: 9px; font-weight: 600; fill: #f78166; }

    /* ── TYPING ──────────────────────────────────── */
    .typed { font-family: 'Caveat', cursive; font-size: 30px; font-weight: 700; }
    .line1 { fill: #C5C6C8; }
    .line2 { fill: #FFFFFF; }
    .line3 { fill: #FDBB30; }
  </style>

  <!-- ═══ BACKGROUND ════════════════════════════════ -->
  <rect width="854" height="220" fill="#0d1117" />

  <!-- ═══ TOP DOTTED LINE ═══════════════════════════ -->
  <line x1="0" y1="103" x2="854" y2="103"
        stroke="#e6edf3" stroke-width="2" opacity="0.2"
        stroke-linecap="round" stroke-dasharray="10 10" />

  <!-- ═══ SCENE 1: WALKER ═══════════════════════════ -->
  <g class="scene-wk">
    <g class="wk-mover" stroke-linecap="round" fill="none">

      <!-- Walking pose -->
      <g class="wk-walk">
        <g class="wk-bouncer">
          <g stroke="#e6edf3" stroke-width="4">
            <path d="M 50 32 Q 35 45 30 55">
              <animate attributeName="d" dur="1s" repeatCount="indefinite"
                       keyTimes="0; 0.25; 0.5; 0.75; 1" calcMode="spline"
                       keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1"
                       values="M 50 32 Q 35 45 30 55; M 50 32 Q 45 45 50 60; M 50 32 Q 65 45 70 55; M 50 32 Q 55 45 50 60; M 50 32 Q 35 45 30 55" />
            </path>
            <path d="M 50 60 Q 65 75 70 95">
              <animate attributeName="d" dur="1s" repeatCount="indefinite"
                       keyTimes="0; 0.25; 0.5; 0.75; 1" calcMode="spline"
                       keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1"
                       values="M 50 60 Q 65 75 70 95; M 50 60 Q 60 80 50 95; M 50 60 Q 45 80 30 95; M 50 60 Q 70 70 40 85; M 50 60 Q 65 75 70 95" />
            </path>
          </g>
          <g stroke="#e6edf3" stroke-width="4">
            <circle cx="50" cy="20" r="10" />
            <line x1="50" y1="30" x2="50" y2="60" />
          </g>
          <g stroke="#e6edf3" stroke-width="4">
            <path d="M 50 32 Q 65 45 70 55">
              <animate attributeName="d" dur="1s" repeatCount="indefinite"
                       keyTimes="0; 0.25; 0.5; 0.75; 1" calcMode="spline"
                       keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1"
                       values="M 50 32 Q 65 45 70 55; M 50 32 Q 55 45 50 60; M 50 32 Q 35 45 30 55; M 50 32 Q 45 45 50 60; M 50 32 Q 65 45 70 55" />
            </path>
            <path d="M 50 60 Q 45 80 30 95">
              <animate attributeName="d" dur="1s" repeatCount="indefinite"
                       keyTimes="0; 0.25; 0.5; 0.75; 1" calcMode="spline"
                       keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1"
                       values="M 50 60 Q 45 80 30 95; M 50 60 Q 70 70 40 85; M 50 60 Q 65 75 70 95; M 50 60 Q 60 80 50 95; M 50 60 Q 45 80 30 95" />
            </path>
          </g>
        </g>
      </g>

      <!-- Waving pose -->
      <g class="wk-wave" stroke-width="4">
        <g stroke="#e6edf3">
          <path d="M 50 60 Q 40 80 35 95" />
          <path d="M 50 32 Q 35 45 35 60" />
        </g>
        <g stroke="#e6edf3">
          <circle cx="50" cy="20" r="10" />
          <line x1="50" y1="30" x2="50" y2="60" />
        </g>
        <g stroke="#e6edf3">
          <path d="M 50 60 Q 60 80 65 95" />
          <path class="wk-waving-arm" d="M 50 32 Q 70 40 75 15" />
        </g>
      </g>

    </g>
  </g>

  <!-- ═══ SCENE 2: SKATER ════════════════════════════ -->
  <g class="scene-sk">
    <g class="sk-group" stroke-linecap="round" fill="none">
      <g stroke="#e6edf3">
        <path stroke-width="4" d="M 50 60 Q 40 70 35 91">
          <animate attributeName="d" dur="2s" repeatCount="indefinite"
                   keyTimes="0; 0.2; 0.4; 0.6; 1" calcMode="spline"
                   keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1"
                   values="M 50 60 Q 40 70 35 91; M 50 60 Q 55 80 45 103; M 50 60 Q 35 85 20 80; M 50 60 Q 30 75 30 85; M 50 60 Q 40 70 35 91" />
        </path>
        <path stroke-width="4" d="M 60 32 Q 50 45 45 60">
          <animate attributeName="d" dur="2s" repeatCount="indefinite"
                   keyTimes="0; 0.2; 0.4; 0.6; 1" calcMode="spline"
                   keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1"
                   values="M 60 32 Q 50 45 45 60; M 60 32 Q 45 45 35 55; M 60 32 Q 35 45 25 50; M 60 32 Q 45 45 40 60; M 60 32 Q 50 45 45 60" />
        </path>
      </g>
      <g stroke="#e6edf3">
        <path d="M 20 88 L 30 93 L 70 93 L 80 88" stroke-width="3" stroke-linejoin="round" />
        <circle cx="35" cy="99" r="4" stroke-width="2" />
        <circle class="sk-wheel" cx="35" cy="99" r="2" stroke-width="2" stroke-dasharray="2 2" />
        <circle cx="65" cy="99" r="4" stroke-width="2" />
        <circle class="sk-wheel" cx="65" cy="99" r="2" stroke-width="2" stroke-dasharray="2 2" />
      </g>
      <g stroke="#e6edf3" stroke-width="4">
        <circle cx="65" cy="22" r="10" />
        <line x1="50" y1="60" x2="60" y2="32" />
        <path d="M 50 60 Q 55 75 55 91">
          <animate attributeName="d" dur="2s" repeatCount="indefinite"
                   keyTimes="0; 0.2; 0.4; 0.6; 1" calcMode="spline"
                   keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1"
                   values="M 50 60 Q 55 75 55 91; M 50 60 Q 62 85 55 91; M 50 60 Q 50 75 55 91; M 50 60 Q 50 75 55 91; M 50 60 Q 55 75 55 91" />
        </path>
        <path d="M 60 32 Q 70 45 65 60">
          <animate attributeName="d" dur="2s" repeatCount="indefinite"
                   keyTimes="0; 0.2; 0.4; 0.6; 1" calcMode="spline"
                   keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1"
                   values="M 60 32 Q 70 45 65 60; M 60 32 Q 75 45 80 55; M 60 32 Q 80 45 90 50; M 60 32 Q 75 45 75 60; M 60 32 Q 70 45 65 60" />
        </path>
      </g>
    </g>
  </g>

  <!-- ═══ SCENE 3: CYCLIST ═══════════════════════════ -->
  <g class="scene-bi">
    <g class="bi-group" stroke-linecap="round" fill="none">
      <g stroke="#e6edf3">
        <g class="bi-crank">
          <line x1="50" y1="80" x2="50" y2="92" stroke-width="3" />
        </g>
        <path stroke-width="4" d="M 40 50 Q 55 70 50 92">
          <animate attributeName="d" dur="1.5s" repeatCount="indefinite"
                   keyTimes="0; 0.125; 0.25; 0.375; 0.5; 0.625; 0.75; 0.875; 1" calcMode="linear"
                   values="M 40 50 Q 55 70 50 92; M 40 50 Q 45 70 41.5 88.5; M 40 50 Q 40 70 38 80; M 40 50 Q 45 60 41.5 71.5; M 40 50 Q 60 55 50 68; M 40 50 Q 65 60 58.5 71.5; M 40 50 Q 65 65 62 80; M 40 50 Q 60 70 58.5 88.5; M 40 50 Q 55 70 50 92" />
        </path>
        <path d="M 58 30 Q 65 45 75 45" stroke-width="4" />
      </g>
      <g stroke="#e6edf3" stroke-width="2">
        <circle cx="20" cy="80" r="16" />
        <circle class="bi-wheel" cx="20" cy="80" r="14" stroke-dasharray="6 6" opacity="0.5" />
        <circle cx="80" cy="80" r="16" />
        <circle class="bi-wheel" cx="80" cy="80" r="14" stroke-dasharray="6 6" opacity="0.5" />
        <line x1="20" y1="80" x2="50" y2="80" />
        <line x1="20" y1="80" x2="40" y2="55" />
        <line x1="50" y1="80" x2="40" y2="55" />
        <line x1="50" y1="80" x2="75" y2="45" />
        <line x1="40" y1="55" x2="75" y2="45" />
        <line x1="80" y1="80" x2="73" y2="38" />
        <circle cx="50" cy="80" r="4" fill="#e6edf3" />
        <path d="M 68 40 Q 75 38 80 45" stroke-width="3" />
        <line x1="35" y1="53" x2="45" y2="53" stroke-width="4" />
      </g>
      <g stroke="#e6edf3" stroke-width="4">
        <circle cx="62" cy="20" r="10" />
        <line x1="40" y1="50" x2="58" y2="30" />
        <g class="bi-crank">
          <line x1="50" y1="80" x2="50" y2="68" stroke-width="3" />
        </g>
        <path d="M 40 50 Q 60 55 50 68">
          <animate attributeName="d" dur="1.5s" repeatCount="indefinite"
                   keyTimes="0; 0.125; 0.25; 0.375; 0.5; 0.625; 0.75; 0.875; 1" calcMode="linear"
                   values="M 40 50 Q 60 55 50 68; M 40 50 Q 65 60 58.5 71.5; M 40 50 Q 65 65 62 80; M 40 50 Q 60 70 58.5 88.5; M 40 50 Q 55 70 50 92; M 40 50 Q 45 70 41.5 88.5; M 40 50 Q 40 70 38 80; M 40 50 Q 45 60 41.5 71.5; M 40 50 Q 60 55 50 68" />
        </path>
        <path d="M 58 30 Q 65 35 75 45" />
      </g>
    </g>
  </g>

  <!-- ═══ STATS ROW ══════════════════════════════════ -->

  <!-- Top Language -->
  <g>
    <rect x="67" y="113" width="110" height="16" rx="8" fill="#f7816622" stroke="#f78166" stroke-width="1"/>
    <text x="122" y="121" dy="0.35em" class="stat-lang" text-anchor="middle">JavaScript</text>
    <text x="122" y="138"  class="stat-label" text-anchor="middle">top lang</text>
  </g>
  <!-- Commits -->
  <g>
    <text x="268" y="122" class="stat-val" text-anchor="middle">310</text>
    <text x="268" y="138" class="stat-label" text-anchor="middle">commits</text>
  </g>
  <!-- Stars -->
  <g>
    <text x="390" y="122" class="stat-val" text-anchor="middle">7</text>
    <text x="390" y="138" class="stat-label" text-anchor="middle">stars</text>
  </g>
  <!-- Repos -->
  <g>
    <text x="500" y="122" class="stat-val" text-anchor="middle">4</text>
    <text x="500" y="138" class="stat-label" text-anchor="middle">repos</text>
  </g>
  <!-- Open Issues -->
  <g>
    <text x="622" y="122" class="stat-val" text-anchor="middle">3</text>
    <text x="622" y="138" class="stat-label" text-anchor="middle">open</text>
  </g>
  <!-- Closed Issues -->
  <g>
    <text x="744" y="122" class="stat-val" text-anchor="middle">4</text>
    <text x="744" y="138" class="stat-label" text-anchor="middle">closed</text>
  </g>

  <!-- ═══ BOTTOM DOTTED LINE ════════════════════════ -->
  <line x1="0" y1="150" x2="854" y2="150"
        stroke="#e6edf3" stroke-width="2" opacity="0.2"
        stroke-linecap="round" stroke-dasharray="10 10" />

  <!-- ═══ TYPING ANIMATION ══════════════════════════ -->
  <g transform="translate(20, 155)">

    <!-- "Hey There…" — 5000ms, gray -->
    <path id="tp0">
      <animate id="td0" attributeName="d"
               begin="0s;td2.end" dur="5000ms" fill="remove"
               values="m0,30 h0 ; m0,30 h810 ; m0,30 h810 ; m0,30 h0"
               keyTimes="0;0.6;0.8;1"/>
    </path>
    <text class="typed line1" dominant-baseline="middle">
      <textPath xlink:href="#tp0">Hey There, It's Christian Darby-Ward</textPath>
    </text>

    <!-- "A Software Developer" — 2800ms, white/dark -->
    <path id="tp1">
      <animate id="td1" attributeName="d"
               begin="td0.end" dur="2800ms" fill="remove"
               values="m0,30 h0 ; m0,30 h330 ; m0,30 h330 ; m0,30 h0"
               keyTimes="0;0.6;0.8;1"/>
    </path>
    <text class="typed line2" dominant-baseline="middle">
      <textPath xlink:href="#tp1">A Software Developer</textPath>
    </text>

    <!-- "And Student At KSU" — 2800ms, gold -->
    <path id="tp2">
      <animate id="td2" attributeName="d"
               begin="td1.end" dur="2800ms" fill="remove"
               values="m0,30 h0 ; m0,30 h300 ; m0,30 h300 ; m0,30 h0"
               keyTimes="0;0.6;0.8;1"/>
    </path>
    <text class="typed line3" dominant-baseline="middle">
      <textPath xlink:href="#tp2">And Student At KSU</textPath>
    </text>

  </g>

</svg>
