name: Update Stats SVG

on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC daily
  workflow_dispatch:        # also triggerable manually from the Actions tab

permissions:
  contents: write           # needed to push the updated SVG back to the repo

jobs:
  update-stats:
    name: Patch header-typing.svg with live stats
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Patch stats into header-typing.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: Detractless
        run: python scripts/generate_stats.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/header.svg
          if git diff --staged --quiet; then
            echo "header.svg unchanged — nothing to commit"
          else
            git commit -m "chore: update stats [skip ci]"
            git push
          fi
